<!DOCTYPE HTML>
<html>
<head>
<meta charset = UTF-8>
<title>TTS Website</title>
<link rel = "stylesheet" href = "styling.css">
</head>
<body>

<div class = "content-heading">
    <!-- <img class = "logo-fbt" src = "fbt.jpg" alt = "FBT Logo"> -->
    <h1 class = "title-header">Simple Text To Speech Converter</h1><br>
    <input class = "settings" type = "image" src = "gear.png">

</div>

<div class = "outer-container"> 
    <div class = "inner-container">

        <div class = "content-label">
            <label>Type here to convert the text to speech</label><br>
        </div>

        <div class = "content-text">
            <textarea id = converttext placeholder = "Convert to Speech..." cols = "60" rows = "15"></textarea><br>
        </div>

        <div class = "content-button">
            <button class = "convert-class" id = convertBtn>Convert & Play</button>
            <button class = "download-class" id = downloadBtn>Download</button>
        </div>

    </div>
</div>

</body>
</html>
